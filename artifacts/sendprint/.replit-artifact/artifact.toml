kind = "web"
previewPath = "/"
title = "SendPrint Dashboard"
version = "1.0.0"
id = "artifacts/sendprint"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25005

[services.development]
run = "pnpm --filter @workspace/sendprint run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sendprint", "run", "build" ]
publicDir = "artifacts/sendprint/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25005"
BASE_PATH = "/"
